<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivar Engine - Panel Esteganográfico</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; color: #212529; }
        .card { max-width: 480px; margin: 20px auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        h3 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 25px; font-weight: 700; }
        label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 8px; font-size: 14px; color: #475569; }
        input[type="password"] { width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; background-color: #f8fafc; }
        .radio-box { display: flex; gap: 15px; margin: 15px 0; }
        .radio-btn { flex: 1; text-align: center; }
        .radio-btn input { display: none; }
        .radio-btn label { background: #f1f5f9; padding: 12px; border-radius: 10px; display: block; cursor: pointer; font-weight: 600; margin: 0; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .radio-btn input:checked + label { background: #0284c7; color: white; border-color: #0284c7; }
        .btn-action { width: 100%; padding: 14px; background-color: #0f172a; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .file-box { border: 2px dashed #cbd5e1; padding: 15px; border-radius: 10px; background: #f8fafc; text-align: center; margin-bottom: 15px; }
        .error { background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 8px; border: 1px solid #fca5a5; font-size: 14px; margin-bottom: 15px; }
        .progress-container { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; background-color: #e2e8f0; border-radius: 10px; overflow: hidden; height: 12px; }
        .progress-fill { width: 100%; height: 100%; background-color: #0284c7; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="card">
    <h3>🔏 Vivar Engine SDK</h3>

    {% if error %} <div class="error">{{ error }}</div> {% endif %}

    {% if step == 1 %}
    <form method="POST" action="/">
        <input type="hidden" name="action" value="validar_clave">
        <label>Clave de Seguridad:</label>
        <input type="password" name="clave" required minlength="4">
        <div class="radio-box">
            <div class="radio-btn">
                <input type="radio" id="c" name="operacion" value="cifrar" checked><label for="c">🔒 Ocultar</label>
            </div>
            <div class="radio-btn">
                <input type="radio" id="d" name="operacion" value="descifrar"><label for="d">🔓 Extraer</label>
            </div>
        </div>
        <button type="submit" class="btn-action">Continuar</button>
    </form>
    {% endif %}

    {% if step == 2 %}
    <form method="POST" 
          action="{{ '/ocultar' if operacion == 'cifrar' else '/extraer' }}" 
          enctype="multipart/form-data" 
          onsubmit="this.querySelector('button').style.display='none'; document.getElementById('prog').style.display='block';">

        {% if operacion == "cifrar" %}
        <div class="file-box">
            <label>Archivo Secreto (Payload):</label>
            <input type="file" name="file_secreto" required>
        </div>
        <div class="file-box">
            <label>Archivo Portador:</label>
            <input type="file" name="file_portador" required>
        </div>
        {% else %}
        <div class="file-box">
            <label>Archivo con datos ocultos:</label>
            <input type="file" name="file_cargado" required>
        </div>
        {% endif %}

        <button type="submit" class="btn-action">Ejecutar Proceso</button>
        
        <div id="prog" class="progress-container">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p style="text-align:center; font-size:12px; margin-top:10px;">Procesando en Core Rust...</p>
        </div>
    </form>
    {% endif %}
</div>

</body>
</html>
