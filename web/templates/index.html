<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivar Engine - Panel Esteganográfico</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; color: #212529; }
        .card { max-width: 480px; margin: 20px auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        h3 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 25px; font-weight: 700; }
        label { font-weight: 600; display: block; margin-top: 15px; margin-bottom: 8px; font-size: 14px; color: #475569; }
        input[type="password"], input[type="file"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background-color: #f8fafc; }
        .radio-box { display: flex; gap: 15px; margin: 15px 0; }
        .radio-btn { flex: 1; text-align: center; }
        .radio-btn input { display: none; }
        .radio-btn label { background: #f1f5f9; padding: 12px; border-radius: 10px; display: block; cursor: pointer; font-weight: 600; border: 1px solid #e2e8f0; }
        .radio-btn input:checked + label { background: #0284c7; color: white; border-color: #0284c7; }
        .btn-action { width: 100%; padding: 14px; background-color: #0f172a; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-action:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .progress-container { display: none; margin-top: 20px; text-align: center; }
        .progress-bar { width: 100%; background-color: #e2e8f0; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { width: 100%; height: 100%; background-color: #0284c7; }
    </style>
</head>
<body>

<div class="card">
    <h3>🔏 Vivar Engine SDK</h3>

    {% if step == 1 %}
    <form method="POST" action="/">
        <input type="hidden" name="action" value="validar_clave">
        <label>Clave de Sesión:</label>
        <input type="password" name="clave" required minlength="4" placeholder="••••••••">
        <div class="radio-box">
            <div class="radio-btn">
                <input type="radio" id="c" name="operacion" value="cifrar" checked><label for="c">🔒 Ocultar</label>
            </div>
            <div class="radio-btn">
                <input type="radio" id="d" name="operacion" value="descifrar"><label for="d">🔓 Extraer</label>
            </div>
        </div>
        <button type="submit" class="btn-action">Iniciar Sesión</button>
    </form>
    {% endif %}

    {% if step == 2 %}
    <form id="procForm" method="POST" 
          action="{{ '/ocultar' if operacion == 'cifrar' else '/extraer' }}" 
          enctype="multipart/form-data">
        
        <input type="hidden" name="clave_val" value="{{ clave }}">

        {% if operacion == "cifrar" %}
        <label>Archivo Secreto:</label>
        <input type="file" name="file_secreto" required>
        <label>Archivo Portador:</label>
        <input type="file" name="file_portador" required>
        {% else %}
        <label>Archivo Esteganografiado:</label>
        <input type="file" name="file_cargado" required>
        {% endif %}

        <button type="submit" id="btn-submit" class="btn-action">Procesar en Vivar Engine</button>
        
        <div id="prog" class="progress-container">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p style="font-size:12px; margin-top:10px; color:#64748b;">Inyectando clave espectral...</p>
        </div>
    </form>

    <script>
        document.getElementById('procForm').addEventListener('submit', function() {
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-submit').innerText = 'Procesando...';
            document.getElementById('prog').style.display = 'block';
        });
    </script>
    {% endif %}
</div>
</body>
</html>
