<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivar Engine PQC - Mobile Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; font-family: monospace; }
        .radio-group { display: flex; justify-content: space-around; margin: 20px 0; }
        .radio-label { font-size: 16px; cursor: pointer; padding: 10px; background: #eef2f5; border-radius: 8px; width: 40%; text-align: center; font-weight: bold; }
        input[type="radio"]:checked + .radio-label { background: #3498db; color: white; }
        input[type="radio"] { display: none; }
        button { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:active { background-color: #27ae60; }
        .status-box { background: #2c3e50; color: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔏 Vivar Engine SDK</h2>
    
    <form method="POST">
        <label>1. Operación:</label>
        <div class="radio-group">
            <input type="radio" id="cifrar" name="opcion" value="cifrar" checked>
            <label for="cifrar" class="radio-label">🔒 Cifrar</label>

            <input type="radio" id="descifrar" name="opcion" value="descifrar">
            <label for="descifrar" class="radio-label">🔓 Descifrar</label>
        </div>

        <label for="ruta">2. Ruta del Archivo en tu Celular:</label>
        <input type="text" id="ruta" name="ruta" placeholder="Ej: /sdcard/Download/documento.pdf" required>

        <label for="key">3. Clave Secreta:</label>
        <input type="text" id="key" name="key" value="VIVAR_ENGINE_PROD_2026_SECURITY_32" required>

        <button type="submit">Ejecutar en Core Rust</button>
    </form>

    {% if estado %}
        <div class="status-box">
            {{ estado }}
        </div>
    {% endif %}
</div>

</body>
</html>
