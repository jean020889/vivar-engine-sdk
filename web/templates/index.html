<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivar Engine - Panel PQC</title>
    <style>
        /* ... tus estilos existentes se mantienen iguales ... */
    </style>
</head>
<body>

<div class="card">
    <h3>🔏 Vivar Engine SDK</h3>

    {% if step == 1 %}
    <form method="POST" action="/">
        <input type="hidden" name="action" value="validar_clave">
        <label>Clave de Sesión:</label>
        <input type="password" name="clave" required minlength="4" placeholder="••••••••">
        <div class="radio-box">
            <div class="radio-btn">
                <input type="radio" id="c" name="operacion" value="cifrar" checked><label for="c">🔒 Ocultar</label>
            </div>
            <div class="radio-btn">
                <input type="radio" id="d" name="operacion" value="descifrar"><label for="d">🔓 Extraer</label>
            </div>
        </div>
        <button type="submit" class="btn-action">Iniciar Sesión</button>
    </form>
    {% endif %}

    {% if step == 2 %}
    <form id="procForm" method="POST" 
          action="{{ '/ocultar' if operacion == 'cifrar' else '/extraer' }}" 
          enctype="multipart/form-data">
        
        <input type="hidden" name="clave_val" value="{{ clave }}">

        {% if operacion == "cifrar" %}
        <label>Archivo Secreto:</label>
        <input type="file" name="file_secreto" id="file_secreto" required>
        <label>Archivo Portador:</label>
        <input type="file" name="file_portador" id="file_portador" required>
        {% else %}
        <label>Archivo Esteganografiado:</label>
        <input type="file" name="file_cargado" id="file_cargado" required>
        {% endif %}

        <button type="submit" id="btn-submit" class="btn-action">Ejecutar Operación</button>
        
        <button type="button" class="btn-action" style="background:#64748b;" onclick="window.location.href='/'">Volver al Inicio</button>
        
        <div id="prog" class="progress-container">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p style="font-size:12px; margin-top:10px; color:#64748b;">Procesando PQC Grado Militar...</p>
        </div>
    </form>

    <script>
        document.getElementById('procForm').addEventListener('submit', function(e) {
            // Validación de peso
            const inputs = document.querySelectorAll('input[type="file"]');
            for (let input of inputs) {
                if (input.files[0] && input.files[0].size > 50 * 1024 * 1024) {
                    alert("El archivo supera los 50MB permitidos.");
                    e.preventDefault();
                    return;
                }
            }
            
            // UI Feedback
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-submit').innerText = 'Procesando archivo...';
            document.getElementById('prog').style.display = 'block';

            // Nota: Al usar send_file en Flask (como en el app.py que actualizamos), 
            // el navegador descargará el archivo automáticamente y mantendrá la página en el estado actual.
            // Tras la descarga, el usuario puede presionar 'Volver al Inicio'.
        });
    </script>
    {% endif %}
</div>
</body>
</html>
