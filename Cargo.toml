[package]
name = "core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[dependencies]
zeroize = { version = "1.8", features = ["derive"] }
pqcrypto-kyber = "0.7"
pqcrypto-traits = "0.3"
hkdf = "0.12"
sha2 = "0.10"
hmac = "0.12"
