[package]
name = "vivar-engine-sdk"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Librería de algoritmos post-cuánticos del NIST
pqcrypto-kyber = "0.7" 
pqcrypto-traits = "0.3"
# Para derivación segura (si se requiere post-KEM)
hkdf = "0.12"
sha3 = "0.10"

[dependencies]
pqcrypto-kyber = "0.7"
pqcrypto-traits = "0.3"
zeroize = { version = "1.7", features = ["derive"] }

