[package]
name = "vivar-engine"
version = "0.1.0"
edition = "2021"

# Configuración del motor para ser una librería dinámica compatible con C
[lib]
path = "src/lib.rs"
crate-type = ["cdylib"]

# Optimizaciones de nivel industrial para criptografía
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
# Mantenemos strip = false para que ctypes pueda encontrar los nombres de funciones
strip = false 

[dependencies]
zeroize = { version = "1.8", features = ["derive"] }
pqcrypto-kyber = "0.7"
pqcrypto-traits = "0.3"
hkdf = "0.12"
sha2 = "0.10"
hmac = "0.12"
